name: CD — Build Release

on:
  push:
    tags:
      - 'v*'  # triggers on v1.0.0, v1.1.0, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build extension ZIP
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          zip -r "dist/resume-tailor-${VERSION}.zip" \
            manifest.json \
            popup.html popup.js \
            content.js background.js \
            styles/ libs/ icons/
          echo "✅ Built: $(ls -lh dist/*.zip)"

      - name: Create GitHub Release with ZIP attached
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ## Resume Tailor AI ${{ github.ref_name }}

            ### Install
            1. Download the ZIP below
            2. Extract it
            3. Open chrome://extensions → Enable Developer Mode → Load Unpacked

            ### Publish to Chrome Web Store
            Upload the ZIP at https://chrome.google.com/webstore/devconsole
            (One-time $5 developer fee required)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
