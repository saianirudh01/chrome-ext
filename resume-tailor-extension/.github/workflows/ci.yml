name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate manifest.json structure
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json','utf8'));
          if (!manifest.name) throw new Error('Missing name in manifest');
          if (!manifest.version) throw new Error('Missing version in manifest');
          if (manifest.manifest_version !== 3) throw new Error('manifest_version must be 3');
          console.log('✅ manifest.json is valid');
          "

      - name: Check required files exist
        run: |
          for file in popup.html popup.js content.js background.js; do
            if [ ! -f "$file" ]; then
              echo "Error: $file does not exist."
              exit 1
            fi
          done
          echo "✅ All required files exist."

      - name: Scan for hardcoded API keys
        run: |
          if grep -rn "AIza" --include=\*.js . ; then
            echo "❌ Error: Found potential hardcoded Google API key (starts with AIza)."
            exit 1
          else
            echo "✅ No hardcoded API keys found."
          fi

      - name: Summary
        run: echo "✅ All checks passed — extension is valid"
