name: CI — Validate Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json exists and is valid JSON
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const required = ['name', 'version', 'manifest_version'];
            required.forEach(f => {
              if (!m[f]) throw new Error('manifest.json missing field: ' + f);
            });
            if (m.manifest_version !== 3) throw new Error('Must be Manifest V3');
            console.log('✅ manifest.json valid:', m.name, 'v' + m.version);
          "

      - name: Check all required files exist
        run: |
          files=(
            "popup.html" "popup.js" "content.js"
            "background.js" "styles/popup.css"
            "libs/mammoth.min.js" "libs/docx.umd.min.js"
            "libs/pdf.min.js"
            "libs/pdf.worker.min.js"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
            echo "✅ Found: $f"
          done

      - name: Check for hardcoded API keys in source
        run: |
          # Gemini keys start with AIza
          if grep -r "AIza" . --include="*.js" --include="*.html" --exclude-dir=".git"; then
            echo "❌ Hardcoded API key found in source! Use chrome.storage.local instead."
            exit 1
          fi
          echo "✅ No hardcoded API keys found"

      - name: Check for inline event handlers (MV3 CSP violation)
        run: |
          if grep -n "onclick=\"\|onchange=\"\|onsubmit=\"" popup.html; then
            echo "❌ Inline event handlers found — MV3 CSP blocks these. Use addEventListener."
            exit 1
          fi
          echo "✅ No inline event handlers"

      - name: Confirm chrome.storage.local used for key (not .env or hardcode)
        run: |
          if grep -n "\.env\|process\.env\|GEMINI_API_KEY\s*=" popup.js; then
            echo "❌ .env pattern found — use chrome.storage.local for key storage in extensions"
            exit 1
          fi
          if grep -q "chrome.storage.local" popup.js; then
            echo "✅ API key correctly stored in chrome.storage.local"
          else
            echo "❌ chrome.storage.local not found in popup.js"
            exit 1
          fi

      - name: All checks passed
        run: echo "✅ Extension is valid and ready to load"
